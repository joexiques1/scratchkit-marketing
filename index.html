<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Scratchkit — Build Artist Websites Fast</title>

<meta name="description" content="Scratchkit lets artists build beautiful websites in minutes. No hosting, no plugins, no setup headaches.">

<meta property="og:title" content="Scratchkit — Build Artist Websites Fast">
<meta property="og:description" content="Create a stunning artist website in minutes. No hosting. No code. Just launch.">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* =========================
   BASE THEME
========================= */
:root{
  --bg:#4d4615; 
  --text:#ffe699;
  --muted:#d4c483;
  --yellow:#ffcc00;
  --orange:#ff6100;
}


*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  color:none;
}

/* Safely styles background and colors globally without breaking React's container layout */
body{
  font-family:"Nunito", sans-serif;
  color:var(--text);
  background-image: url("/noise.jpg");
  background-repeat: repeat;
  background-color: var(--bg); 
  background-size: 200px;
}

a{
  color:inherit;
  text-decoration:none;
}

.container{
  width:min(800px,92%);
  margin:auto;
}

/* FIXED: The flexbox layout lives safely here now, so it won't collapse the React root */
.landing-wrapper {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* =========================
   HEADER
========================= */
header {
  padding: 40px 0 10px;
  text-align: center;
  z-index: 10;
}

.logo{
  height: 60px;
  display: inline-block;
}

/* =========================
   HERO / MAIN CONTENT
========================= */
.hero{
  padding: 60px 0 60px;
  text-align:center;
  flex-grow: 1;
  display: flex;
  align-items: center;
}

.hero h1{
  font-size: clamp(5rem, 5.5vw, 4.8rem);
  font-weight: 800;
  color: var(--yellow);
  letter-spacing: -1px;
  line-height: 1.1;
  max-width: 780px;
  margin: 0 auto 24px;
}

.hero p{
  margin: 0 auto 40px;
  max-width: 620px;
  font-size: clamp(1.1rem, 2vw, 1.35rem);
  color: var(--muted);
  line-height: 1.5;
  font-weight: 500;
}

.hero-cta{
  display:flex;
  justify-content:center;
}

.btn{
  background: var(--orange);
  color: #622500;
  padding: 18px 48px;
  border-radius: 16px;
  font-size: 1.4rem;
  font-weight: 800;
  display: inline-flex;
  transition: transform 0.2s, background-color 0.2s;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}

.btn:hover{
  transform: translateY(-2px);
  background: #ff8512;
}

/* =========================
   FOOTER
========================= */
footer {
  padding: 40px 0;
  text-align: center;
  z-index: 10;
}

.footer-text {
  color: var(--muted);
  font-size: 0.95rem;
  opacity: 0.7;
}
</style>
</head>

<body>
  <div class="landing-wrapper">
    <header>
      <div class="container">
        <img src="/logo.png" class="logo" alt="Scratchkit logo" />
      </div>
    </header>

    <section class="hero">
      <div class="container">
        <h1>Take back your online presence.</h1>
        <p>
          Stop overpaying giant hosting companies for your artist website. Build it yourself in 15 minutes.
        </p>
        <div class="hero-cta">
          <a class="btn" href="/build">Start Now</a>
        </div>
      </div>
    </section>

    <footer>
     
    </footer>
  </div>
</body>
</html>
